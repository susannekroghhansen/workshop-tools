<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthesis Accelerator</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <style>
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text);
    }

    .header p {
      margin-top: 0.3rem;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── API key bar ── */
    .api-bar {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
    }

    .api-bar label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      white-space: nowrap;
    }

    .api-bar input {
      flex: 1;
      min-width: 180px;
      border: none;
      border-bottom: 1.5px solid var(--border);
      outline: none;
      font-size: 0.82rem;
      font-family: 'Menlo', 'Consolas', monospace;
      color: var(--text);
      background: transparent;
      padding: 0.1rem 0.1rem 0.25rem;
      transition: border-color 0.15s;
    }

    .api-bar input:focus {
      border-bottom-color: var(--primary);
    }

    .api-bar input::placeholder {
      color: #b0c4bc;
    }

    .api-bar .api-note {
      font-size: 0.75rem;
      color: #9ab0a8;
      white-space: nowrap;
    }

    /* ── Input section ── */
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.5rem;
      box-shadow: var(--shadow);
      margin-bottom: 1.25rem;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      resize: vertical;
      min-height: 220px;
      line-height: 1.6;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus {
      border-color: var(--primary);
    }

    textarea::placeholder {
      color: #a8bab4;
    }

    /* ── Button ── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.15s, transform 0.1s;
      margin-top: 1rem;
    }

    .btn-primary:hover {
      background: var(--primary-dk);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      background: #a8c4b4;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Loading state ── */
    .loading-row {
      display: none;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 0 0.25rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .loading-row.visible {
      display: flex;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Error ── */
    .error-msg {
      display: none;
      background: #fce8e8;
      border: 1px solid #f0c4c4;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-size: 0.87rem;
      color: #7a1f1f;
      margin-top: 1rem;
      line-height: 1.5;
    }

    .error-msg.visible {
      display: block;
    }

    /* ── Results ── */
    #results {
      display: none;
    }

    #results.visible {
      display: block;
    }

    .results-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .results-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .reset-btn {
      background: none;
      border: none;
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .reset-btn:hover {
      color: var(--text);
    }

    /* ── Theme cards ── */
    .theme-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .theme-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .theme-card-header {
      background: var(--primary-lt);
      border-bottom: 1px solid #b8d0c8;
      padding: 1rem 1.25rem;
    }

    .theme-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--primary-dk);
      letter-spacing: -0.01em;
    }

    .theme-summary {
      margin-top: 0.3rem;
      font-size: 0.875rem;
      color: #3a5a4a;
      line-height: 1.5;
    }

    .theme-card-body {
      padding: 0.9rem 1.25rem;
    }

    .sticky-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .sticky-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .sticky-list li {
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.45;
      padding-left: 1.1rem;
      position: relative;
    }

    .sticky-list li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--muted);
    }
  </style>
</head>
<body>
<div class="page">

  <a href="../index.html" style="display:inline-flex; align-items:center; gap:5px; font-size:13px; color:var(--muted); text-decoration:none; margin-bottom:1rem;">← Back to toolkit</a>

  <div class="header">
    <h1>Synthesis Accelerator</h1>
    <p>Paste your sticky notes, find the themes in seconds.</p>
  </div>

  <!-- Input -->
  <div class="section">
    <div class="section-label">Step 1 — Paste your sticky notes</div>
    <textarea
      id="notes-input"
      placeholder="One idea per line, e.g.

Need clearer onboarding
Meetings run too long
People don't know what to prioritise
Lack of psychological safety
No shared definition of done
Cross-team communication gaps"
    ></textarea>
    <button class="btn-primary" id="find-btn" onclick="findThemes()">Find themes</button>
    <div class="loading-row" id="loading">
      <div class="spinner"></div>
      <span>Clustering ideas…</span>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="results-header">
      <span class="results-title" id="results-count"></span>
      <button class="reset-btn" onclick="resetResults()">Start over</button>
    </div>
    <div class="theme-grid" id="theme-grid"></div>
  </div>

</div>

<script>
  function findThemes() {
    const notes  = document.getElementById('notes-input').value.trim();

    const errorEl   = document.getElementById('error-msg');
    const loadingEl = document.getElementById('loading');
    const btn       = document.getElementById('find-btn');

    errorEl.classList.remove('visible');

    if (!notes) {
      showError('Please paste some sticky notes before finding themes.');
      return;
    }

    const lines = notes.split('\n').map(l => l.trim()).filter(Boolean);
    if (lines.length < 2) {
      showError('Please add at least two sticky notes (one per line).');
      return;
    }

    // Loading state
    btn.disabled = true;
    loadingEl.classList.add('visible');
    document.getElementById('results').classList.remove('visible');

    const prompt = `You are a skilled workshop facilitator and synthesis expert.

I will give you a list of sticky notes from a workshop session. Your job is to cluster them into themes.

For each theme, provide:
1. A short theme name (2–5 words)
2. A one-sentence summary of what the theme is about
3. The list of sticky notes that belong to it (copy them exactly as written)

Return your answer ONLY as a JSON array. No prose, no markdown fences — just the raw JSON. Each element should have this shape:
{
  "theme": "Theme Name",
  "summary": "One sentence describing this theme.",
  "notes": ["sticky note text", "sticky note text"]
}

Here are the sticky notes, one per line:
${lines.map(l => `- ${l}`).join('\n')}`;

    fetch('https://workshop-tools-api.onrender.com/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: prompt }]
      })
    })
    .then(res => {
      if (!res.ok) {
        return res.json().then(body => {
          throw new Error(body.error?.message || `API error ${res.status}`);
        });
      }
      return res.json();
    })
    .then(data => {
      const raw = data.content?.[0]?.text || '';
      let themes;
      try {
        // Strip any accidental markdown code fences if the model adds them
        const cleaned = raw.replace(/^```[\w]*\n?/, '').replace(/\n?```$/, '').trim();
        themes = JSON.parse(cleaned);
      } catch (_) {
        throw new Error('Could not parse the response from Claude. Please try again.');
      }
      if (!Array.isArray(themes) || themes.length === 0) {
        throw new Error('Claude returned an unexpected response. Please try again.');
      }
      renderResults(themes);
    })
    .catch(err => {
      showError(err.message);
    })
    .finally(() => {
      btn.disabled = false;
      loadingEl.classList.remove('visible');
    });
  }

  function renderResults(themes) {
    const grid = document.getElementById('theme-grid');
    const countEl = document.getElementById('results-count');
    const resultsEl = document.getElementById('results');

    countEl.textContent = `Step 2 — ${themes.length} theme${themes.length !== 1 ? 's' : ''} found`;
    grid.innerHTML = '';

    themes.forEach(t => {
      const card = document.createElement('div');
      card.className = 'theme-card';

      const noteItems = (t.notes || [])
        .map(n => `<li>${escapeHtml(n)}</li>`)
        .join('');

      card.innerHTML = `
        <div class="theme-card-header">
          <div class="theme-name">${escapeHtml(t.theme)}</div>
          <div class="theme-summary">${escapeHtml(t.summary)}</div>
        </div>
        <div class="theme-card-body">
          <div class="sticky-label">Sticky notes</div>
          <ul class="sticky-list">${noteItems}</ul>
        </div>
      `;

      grid.appendChild(card);
    });

    resultsEl.classList.add('visible');
    resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function resetResults() {
    document.getElementById('results').classList.remove('visible');
    document.getElementById('notes-input').value = '';
    document.getElementById('error-msg').classList.remove('visible');
    document.getElementById('notes-input').focus();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
