<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Workshop Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:      #f4f7f6;
      --card:    #ffffff;
      --green:   #5e9977;
      --green-dk:#4a7d61;
      --text:    #2e3d38;
      --muted:   #7a9990;
      --border:  #cdd9d5;
      --shadow:  0 2px 14px rgba(0,0,0,0.06);
      --radius:  14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 2rem 1.25rem 3rem;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-size: 1.55rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header p {
      margin-top: 0.35rem;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .tool-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .tool-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.4rem 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 1.1rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      cursor: pointer;
    }

    .tool-card:active {
      transform: scale(0.98);
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }

    @media (hover: hover) {
      .tool-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      }
    }

    .tool-icon {
      font-size: 2rem;
      flex-shrink: 0;
      width: 2.5rem;
      text-align: center;
    }

    .tool-text {
      flex: 1;
    }

    .tool-name {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .tool-desc {
      margin-top: 0.2rem;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .tool-arrow {
      color: var(--border);
      font-size: 1.1rem;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <main>
    <div class="header">
      <h1>Workshop Tools</h1>
      <p>Pick a tool to get started</p>
    </div>

    <div class="tool-grid">
      <a class="tool-card" href="energy-checkin/index.html">
        <div class="tool-icon">⚡</div>
        <div class="tool-text">
          <div class="tool-name">Energy Check-In</div>
          <div class="tool-desc">How's everyone feeling? Let's find out before we dive in.</div>
        </div>
        <div class="tool-arrow">›</div>
      </a>

      <a class="tool-card" href="temperature-check/index.html">
        <div class="tool-icon">🌡️</div>
        <div class="tool-text">
          <div class="tool-name">Temperature Check</div>
          <div class="tool-desc">Take the room's pulse — are we warm, cool, or somewhere in between?</div>
        </div>
        <div class="tool-arrow">›</div>
      </a>

      <a class="tool-card" href="parkinglot/index.html">
        <div class="tool-icon">🅿️</div>
        <div class="tool-text">
          <div class="tool-name">Parking Lot</div>
          <div class="tool-desc">Good idea, wrong moment — park it here and circle back later.</div>
        </div>
        <div class="tool-arrow">›</div>
      </a>
    </div>
  </main>
</body>
</html>
