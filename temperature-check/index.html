<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Check</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      padding: 2rem 1.25rem 3rem;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Facilitator badge ── */
    .facilitator-badge {
      position: fixed;
      top: 14px;
      right: 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 99px;
      padding: 4px 10px;
      z-index: 20;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .header h1 {
      font-size: 1.55rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header p {
      margin-top: 0.35rem;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── Views ── */
    .view { display: none; flex-direction: column; gap: 16px; }
    .view.on { display: flex; }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* ── Form elements ── */
    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      min-height: 96px;
      padding: 13px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      resize: vertical;
      outline: none;
      transition: border-color .15s;
      line-height: 1.5;
    }

    textarea:focus { border-color: var(--primary); }

    /* ── Buttons ── */
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, transform .1s;
      letter-spacing: .01em;
    }

    .btn:active { transform: scale(.98); }
    .btn-blue  { background: var(--primary);  color: #fff; }
    .btn-blue:hover { background: var(--primary-dk); }
    .btn-red   { background: #f5e8e8; color: var(--red-txt); border: 1.5px solid #e8d4d4; }
    .btn-red:hover { background: #efdcdc; }
    .btn:disabled { opacity: .38; cursor: default; pointer-events: none; }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--primary);
      margin-right: 6px;
      animation: pulse 2.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .35; }
    }

    /* ── Scale ── */
    .scale-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .score-btn {
      flex: 1;
      min-height: 60px;
      border: 2px solid var(--border);
      border-radius: 11px;
      background: var(--bg);
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }

    .score-btn:hover  { border-color: var(--primary); background: #e8f0ec; }
    .score-btn.on     { background: var(--primary); border-color: var(--primary); color: #fff; }

    .scale-ends {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 22px;
      padding: 0 2px;
    }

    /* ── Question text ── */
    .q-text {
      font-size: 20px;
      font-weight: 500;
      line-height: 1.45;
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 40px 0;
    }

    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-msg  { color: var(--muted); font-size: 16px; line-height: 1.5; }

    /* ── Average ── */
    .avg-wrap {
      text-align: center;
      padding: 8px 0 14px;
    }

    .avg-num {
      font-size: 64px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
      letter-spacing: -.03em;
    }

    .avg-label { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .resp-count { text-align: center; font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* ── Bars ── */
    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .bar-num {
      font-size: 15px;
      font-weight: 700;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 36px;
      background: var(--bg);
      border-radius: 7px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 7px;
      transition: width .5s cubic-bezier(.2,.8,.3,1);
    }

    .bar-ct {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      width: 24px;
      text-align: right;
      flex-shrink: 0;
    }

    .spread-ends {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
      padding: 0 30px;
    }

    /* ── Suggested moves ── */
    .moves-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .moves-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: block;
    }

    .move-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 12px 0;
      border-top: 1px solid var(--border);
    }

    .move-item:first-of-type { border-top: none; padding-top: 0; }

    .move-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .move-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .moves-loading {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--muted);
      padding: 4px 0;
    }

    .moves-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .moves-error {
      font-size: 13px;
      color: #7a3a3a;
      background: #fce8e8;
      border: 1px solid #f0c4c4;
      border-radius: 8px;
      padding: 10px 12px;
      line-height: 1.5;
    }

    /* ── Word input (follow-up) ── */
    .word-input {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 18px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
      text-align: center;
      letter-spacing: .02em;
    }

    .word-input:focus { border-color: var(--primary); }

    .btn-ghost {
      display: block;
      width: 100%;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      color: var(--muted);
      background: transparent;
      transition: background .15s, color .15s;
    }

    .btn-ghost:hover { background: var(--bg); color: var(--text); }

    .moves-retry {
      display: none;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .moves-retry-note {
      font-size: 12px;
      color: var(--muted);
    }

    .btn-retry {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      color: var(--muted);
      background: transparent;
      transition: background .15s, color .15s, border-color .15s;
    }

    .btn-retry:hover { background: var(--bg); color: var(--text); border-color: #b0b8b4; }

    /* ── Word cloud ── */
    .word-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      align-items: baseline;
      justify-content: center;
      padding: 8px 0 4px;
      line-height: 1.4;
    }

    .word-cloud span {
      color: var(--primary-dk);
      font-weight: 600;
      transition: opacity .2s;
    }

    /* ── Confirmed ── */
    .confirmed {
      text-align: center;
      padding: 28px 0;
    }

    .check-circle {
      width: 58px; height: 58px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .confirmed h2 { font-size: 20px; margin-bottom: 8px; }
    .confirmed p  { font-size: 15px; color: var(--muted); line-height: 1.5; }

    /* ── QR code card ── */
    .qr-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .qr-card canvas {
      border-radius: 8px;
    }

    .qr-url {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      word-break: break-all;
    }

    /* ── Preview mode ── */
    .preview-banner {
      background: #e8f0ec;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--primary-dk);
      text-align: center;
      font-weight: 500;
    }

    .facilitator-nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      justify-content: center;
      gap: 8px;
      z-index: 10;
    }

    .nav-tab {
      padding: 10px 18px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      color: var(--muted);
      background: transparent;
      transition: background .15s, color .15s, border-color .15s;
    }

    .nav-tab:hover { background: var(--bg); color: var(--text); }

    .nav-tab.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* ── Word cloud projection view ── */
    body.wc-mode main {
      max-width: none;
      padding: 0;
    }

    .wc-projection {
      display: flex;
      flex-direction: column;
      min-height: calc(100dvh - 5rem);
    }

    .wc-avg-strip {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 14px 24px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }

    .wc-avg-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .wc-avg-num {
      font-size: 26px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
      letter-spacing: -.02em;
    }

    .wc-avg-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    .wc-avg-question {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
      text-align: center;
      max-width: 600px;
      line-height: 1.4;
    }

    .wc-cloud-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 48px;
    }

    .wc-cloud-area .word-cloud {
      gap: 16px 24px;
    }
  </style>
  <!-- Firebase SDK (Firestore for real-time cross-device sync) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<main id="app"></main>

<script>
  // ── Firebase Setup ───────────────────────────────────────────
  // 1. Create a free Firebase project at https://console.firebase.google.com
  // 2. Add a Web App, copy the config below
  // 3. Enable Firestore in the Firebase console (Start in test mode)
  const firebaseConfig = {
    apiKey:            "AIzaSyBzc_CmZhahAyUNLcGL0vbP25Nj_qBMe7M",
    authDomain:        "workshop-tools-ff457.firebaseapp.com",
    projectId:         "workshop-tools-ff457",
    storageBucket:     "workshop-tools-ff457.firebasestorage.app",
    messagingSenderId: "142740807274",
    appId:             "1:142740807274:web:149757a3b123db843af413"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ── URL-based mode detection ────────────────────────────────
  const params = new URLSearchParams(location.search);
  const IS_FACILITATOR = params.get('facilitator') === '1234';
  const IS_RESULTS     = params.get('view') === 'results';

  // ── Session ID ──────────────────────────────────────────────
  // Facilitator generates a new session ID on first visit and puts it in the URL.
  // Participants join via the QR code which contains the same session ID.
  let sessionId = params.get('session');
  if (!sessionId && IS_FACILITATOR) {
    sessionId = Math.random().toString(36).slice(2, 8).toUpperCase();
    const newUrl = new URL(location.href);
    newUrl.searchParams.set('session', sessionId);
    history.replaceState({}, '', newUrl);
  }

  const BASE_URL = 'https://susannekroghhansen.github.io/workshop-tools/temperature-check/';

  function sessionRef() {
    return db.collection('tc_sessions').doc(sessionId);
  }

  // ── Cached state (updated by Firestore onSnapshot) ──────────
  let cachedState = { q: '', qid: '', rs: [], on: false };
  function st() { return cachedState; }

  function scores(rs) { return rs.map(r => typeof r === 'object' ? r.s : r); }
  function words(rs)  { return rs.map(r => typeof r === 'object' ? r.w : '').filter(w => w); }

  function didRespond() { return sessionStorage.getItem('r_' + st().qid) === '1'; }
  function markResponded() { sessionStorage.setItem('r_' + st().qid, '1'); }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  let picked       = null;
  let pendingScore = null;

  const BAR_COLORS = ['#c09898', '#7aaac0', '#8ab8cc', '#9ecfb8', '#8ec8a8'];
  let movesLastKey   = null;
  let movesPrevNames = [];

  let fPicked    = null;
  let fDidSubmit = false;
  let fView      = 'facilitator'; // 'facilitator' | 'preview' | 'wordcloud'

  // ── Firestore: real-time subscription ──────────────────────
  function subscribeToSession() {
    if (!sessionId) { renderApp(); return; }
    sessionRef().onSnapshot(doc => {
      if (doc.exists) {
        const d = doc.data();
        cachedState = {
          q:   d.q   || '',
          qid: d.qid || '',
          rs:  d.responses || [],
          on:  d.active || false
        };
      } else {
        cachedState = { q: '', qid: '', rs: [], on: false };
      }
      renderApp();
    }, err => console.error('Firestore error:', err));
  }

  // ── Firestore: write operations ─────────────────────────────
  async function activateQ() {
    const text = document.getElementById('q-input')?.value.trim();
    if (!text) return;
    fPicked = null; fDidSubmit = false; movesLastKey = null; movesPrevNames = [];
    await sessionRef().set({ q: text, qid: Date.now().toString(), responses: [], active: true });
  }

  async function resetQ() {
    if (!confirm('Clear the current question and all responses?')) return;
    fPicked = null; fDidSubmit = false; movesLastKey = null; movesPrevNames = [];
    await sessionRef().set({ q: '', qid: '', responses: [], active: false });
  }

  // ── render dispatch ────────────────────────────────────────
  function renderApp() {
    if (!sessionId) { renderNoSession(); return; }
    if (IS_FACILITATOR) renderFacilitatorMode();
    else if (IS_RESULTS) renderResultsMode();
    else renderParticipantMode();
  }

  // ── NO SESSION view ─────────────────────────────────────────
  function renderNoSession() {
    document.getElementById('app').innerHTML = `
      <div class="view on">
        <div class="header"><h1>Temperature Check</h1></div>
        <div class="card">
          <div class="empty">
            <div class="empty-icon">🔗</div>
            <p class="empty-msg">No session found.<br>Please scan the QR code<br>from the facilitator's screen.</p>
          </div>
        </div>
      </div>`;
  }

  // ── PARTICIPANT MODE ───────────────────────────────────────
  function renderParticipantMode() {
    const app = document.getElementById('app');
    const s = st();

    // No question active
    if (!s.on || !s.q) {
      app.innerHTML = `
        <div class="view on">
          <div class="header">
            <h1>Temperature Check</h1>
          </div>
          <div class="card">
            <div class="empty">
              <div class="empty-icon">⏳</div>
              <p class="empty-msg">Waiting for the facilitator<br>to post a question…</p>
            </div>
          </div>
        </div>`;
      return;
    }

    // Already responded — show results
    if (didRespond()) {
      renderResultsMode();
      return;
    }

    // Pending word step
    if (pendingScore !== null) {
      app.innerHTML = `
        <div class="view on">
          <div class="header">
            <h1>One word</h1>
            <p>Optional — what's the main reason you scored that way?</p>
          </div>
          <div class="card">
            <input type="text" class="word-input" id="p-word-input" maxlength="30"
              placeholder="e.g. unclear" autocomplete="off" autocorrect="off" spellcheck="false">
          </div>
          <button class="btn btn-blue" onclick="doWordSubmit()">Submit word</button>
          <button class="btn-ghost" onclick="doWordSkip()">Skip</button>
        </div>`;
      document.getElementById('p-word-input').focus();
      document.getElementById('p-word-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') doWordSubmit();
      });
      return;
    }

    // Active question — show rating
    app.innerHTML = `
      <div class="view on">
        <div class="header">
          <h1>Temperature Check</h1>
        </div>
        <div class="card">
          <span class="field-label">Question</span>
          <p class="q-text">${escapeHtml(s.q)}</p>
        </div>
        <div class="card">
          <p style="font-size:14px; color:var(--muted); margin-bottom:14px">Pick a number that feels right.</p>
          <div class="scale-row" id="score-row">
            ${[1,2,3,4,5].map(n => `<button class="score-btn" onclick="pick(${n})">${n}</button>`).join('')}
          </div>
          <div class="scale-ends">
            <span>not at all</span>
            <span>completely</span>
          </div>
          <button class="btn btn-blue" id="submit-btn" onclick="doSubmit()" disabled>Submit</button>
        </div>
      </div>`;
  }

  function pick(n) {
    picked = n;
    document.querySelectorAll('.score-btn').forEach((b, i) =>
      b.classList.toggle('on', i + 1 === n));
    document.getElementById('submit-btn').disabled = false;
  }

  function doSubmit() {
    if (!picked) return;
    const s = st();
    if (!s.on) return;
    pendingScore = picked;
    picked = null;
    renderParticipantMode();
  }

  async function commitResponse(word) {
    const s = st();
    if (!s.on || pendingScore === null) return;
    markResponded();
    const score = pendingScore;
    pendingScore = null;
    await sessionRef().set(
      { responses: firebase.firestore.FieldValue.arrayUnion({ s: score, w: word.trim() }) },
      { merge: true }
    );
    location.href = location.pathname + '?view=results&session=' + sessionId;
  }

  function doWordSubmit() {
    const word = (document.getElementById('p-word-input')?.value || '').trim();
    commitResponse(word);
  }

  function doWordSkip() { commitResponse(''); }

  // ── RESULTS MODE (participant read-only) ───────────────────
  function renderResultsMode() {
    const app = document.getElementById('app');
    const s = st();

    if (!s.on || !s.q) {
      app.innerHTML = `
        <div class="view on">
          <div class="header"><h1>Temperature Check</h1></div>
          <div class="card">
            <div class="empty">
              <div class="empty-icon">📊</div>
              <p class="empty-msg">No active question yet.</p>
            </div>
          </div>
        </div>`;
      return;
    }

    const rs = s.rs, n = rs.length;
    const sc = scores(rs);
    const ws = words(rs);
    const avg = n ? sc.reduce((a,b) => a+b, 0) / n : null;
    const counts = [1,2,3,4,5].map(v => sc.filter(r => r === v).length);
    const maxC   = Math.max(1, ...counts);

    const barsHtml = counts.map((c, i) => `
      <div class="bar-row">
        <span class="bar-num">${i+1}</span>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(c/maxC*100).toFixed(1)}%; background:${BAR_COLORS[i]}"></div>
        </div>
        <span class="bar-ct">${c}</span>
      </div>`).join('');

    const wordCloudHtml = buildWordCloud(ws);

    app.innerHTML = `
      <div class="view on">
        <div class="header">
          <h1>Results</h1>
        </div>
        <div class="card">
          <span class="field-label">Question</span>
          <p class="q-text">${escapeHtml(s.q)}</p>
        </div>
        <div class="card">
          <div class="avg-wrap">
            <div class="avg-num">${avg !== null ? avg.toFixed(1) : '—'}</div>
            <div class="avg-label">average</div>
          </div>
          <p class="resp-count">${n ? n + (n===1?' response':' responses') : 'No responses yet'}</p>
        </div>
        <div class="card">
          <span class="field-label" style="margin-bottom:16px; display:block">Response spread</span>
          ${barsHtml}
          <div class="spread-ends"><span>not at all</span><span>completely</span></div>
        </div>
        ${wordCloudHtml ? `
        <div class="card">
          <span class="field-label" style="margin-bottom:16px; display:block">In their words</span>
          <div class="word-cloud">${wordCloudHtml}</div>
        </div>` : ''}
      </div>`;
  }

  function buildWordCloud(ws, projection) {
    if (!ws.length) return '';
    const freq = {};
    ws.forEach(w => { const k = w.toLowerCase(); freq[k] = (freq[k]||0)+1; });
    const entries = Object.entries(freq).sort((a,b) => b[1]-a[1]);
    const maxF = entries[0][1];
    const minSize = projection ? 28 : 14;
    const range   = projection ? 44 : 20;
    return entries.map(([word, count]) => {
      const size = Math.round(minSize + (count/maxF)*range);
      const opacity = 0.55 + (count/maxF)*0.45;
      return `<span style="font-size:${size}px; opacity:${opacity}">${escapeHtml(word)}</span>`;
    }).join('');
  }

  // ── FACILITATOR PREVIEW ────────────────────────────────────
  function renderFacilitatorPreview() {
    const app = document.getElementById('app');
    const s = st();
    const badge = document.querySelector('.facilitator-badge');
    if (badge) badge.style.display = 'none';

    const banner = `<div class="preview-banner">Preview mode — this is what participants see</div>`;

    if (!s.on || !s.q) {
      app.innerHTML = `
        <div class="view on">
          ${banner}
          <div class="card">
            <div class="empty">
              <div class="empty-icon">⏳</div>
              <p class="empty-msg">Waiting for the facilitator<br>to post a question…</p>
            </div>
          </div>
        </div>`;
      return;
    }

    app.innerHTML = `
      <div class="view on">
        ${banner}
        <div class="card">
          <span class="field-label">Question</span>
          <p class="q-text">${escapeHtml(s.q)}</p>
        </div>
        <div class="card">
          <p style="font-size:14px; color:var(--muted); margin-bottom:14px">Pick a number that feels right.</p>
          <div class="scale-row">
            ${[1,2,3,4,5].map(n => `<button class="score-btn" disabled>${n}</button>`).join('')}
          </div>
          <div class="scale-ends"><span>not at all</span><span>completely</span></div>
          <button class="btn btn-blue" disabled>Submit</button>
        </div>
        <div class="card">
          <p class="card-title" style="margin-bottom:6px">One word</p>
          <p class="card-sub">Optional — what's the main reason you scored that way?</p>
          <input type="text" class="word-input" placeholder="e.g. unclear" disabled>
        </div>
      </div>`;
  }

  function renderWordCloudView() {
    const badge = document.querySelector('.facilitator-badge');
    if (badge) badge.style.display = 'none';
    const app = document.getElementById('app');
    const s = st();
    const sc = scores(s.rs);
    const ws = words(s.rs);
    const n = s.rs.length;
    const avg = n ? sc.reduce((a,b) => a+b, 0) / n : null;
    const wordCloudHtml = buildWordCloud(ws, true);
    app.innerHTML = `
      <div class="wc-projection">
        <div class="wc-avg-strip">
          <div class="wc-avg-row">
            <span class="wc-avg-num">${avg !== null ? avg.toFixed(1) : '—'}</span>
            <span class="wc-avg-label">average</span>
          </div>
          ${s.q ? `<span class="wc-avg-question">${s.q}</span>` : ''}
        </div>
        <div class="wc-cloud-area">
          ${wordCloudHtml
            ? `<div class="word-cloud">${wordCloudHtml}</div>`
            : `<p style="color:var(--muted); font-size:16px; text-align:center">No words submitted yet</p>`}
        </div>
      </div>`;
  }

  function switchView(view) {
    fView = view;
    const badge = document.querySelector('.facilitator-badge');
    if (badge) badge.style.display = view === 'facilitator' ? '' : 'none';
    updateNavBar();
    renderFacilitatorMode();
  }

  function updateNavBar() {
    const bar = document.querySelector('.facilitator-nav-bar');
    if (!bar) return;
    bar.innerHTML = `
      <button class="nav-tab${fView==='facilitator'?' active':''}" onclick="switchView('facilitator')">Facilitator view</button>
      <button class="nav-tab${fView==='preview'?' active':''}" onclick="switchView('preview')">Participant preview</button>
      <button class="nav-tab${fView==='wordcloud'?' active':''}" onclick="switchView('wordcloud')">Word cloud</button>`;
  }

  // ── FACILITATOR MODE ───────────────────────────────────────
  function renderFacilitatorMode() {
    document.body.classList.toggle('wc-mode', fView === 'wordcloud');
    if (fView === 'preview') { renderFacilitatorPreview(); return; }
    if (fView === 'wordcloud') { renderWordCloudView(); return; }
    const badge = document.querySelector('.facilitator-badge');
    if (badge) badge.style.display = '';
    const app = document.getElementById('app');
    const s = st();
    const n = s.rs.length;
    const sc = scores(s.rs);
    const ws = words(s.rs);
    const avg = n ? sc.reduce((a,b) => a+b, 0)/n : null;

    const participantUrl = `${BASE_URL}?session=${sessionId}`;

    const activeCardHtml = s.on && s.q ? `
      <div class="card">
        <div class="status-bar">
          <span><span class="dot"></span>Question active</span>
          <span>${n + (n===1?' response':' responses')}</span>
        </div>
        <p style="font-size:14px; color:var(--muted); font-style:italic; line-height:1.45">${escapeHtml(s.q)}</p>
        <div style="height:14px"></div>
        <button class="btn btn-red" onclick="resetQ()">Clear question &amp; responses</button>
      </div>` : '';

    const resultsHtml = s.on && s.q ? buildFacilitatorResults(s, sc, ws, avg) : '';

    app.innerHTML = `
      <div class="view on">
        <a href="../index.html" style="display:inline-flex; align-items:center; gap:5px; font-size:13px; color:var(--muted); text-decoration:none; margin-bottom:4px;">
          ← Back to toolkit
        </a>
        <div class="header">
          <h1>Ask the room</h1>
          <p>Activate a question for participants to respond.</p>
        </div>

        <div class="card">
          <div class="qr-card">
            <canvas id="qr-canvas"></canvas>
            <p class="qr-url">${escapeHtml(participantUrl)}</p>
          </div>
        </div>

        <div class="card">
          <span class="field-label">Question</span>
          <textarea id="q-input" placeholder="e.g. How clear is your understanding of the next steps?">${escapeHtml(s.q)}</textarea>
        </div>

        <button class="btn btn-blue" id="activate-btn" onclick="activateQ()">
          ${s.on && s.q ? 'Replace question' : 'Activate question'}
        </button>

        ${activeCardHtml}

        ${s.on && s.q ? `
        <div class="card">
          <span class="field-label" style="margin-bottom:14px; display:block">Your rating</span>
          <div class="scale-row" id="f-score-row">
            ${[1,2,3,4,5].map(n => `<button class="score-btn${n===fPicked?' on':''}" onclick="fPick(${n})">${n}</button>`).join('')}
          </div>
          <div class="scale-ends"><span>not at all</span><span>completely</span></div>
          <button class="btn btn-blue" id="f-submit-btn" onclick="fSubmit()" ${fPicked?'':'disabled'}>Submit my rating</button>
        </div>` : ''}

        ${resultsHtml}

        <div id="f-moves-wrap" style="display:none; flex-direction:column; gap:16px">
          <div class="moves-card">
            <span class="moves-label">Suggested moves</span>
            <div id="f-moves-body">
              <div class="moves-loading" id="f-moves-loading" style="display:none">
                <div class="moves-spinner"></div>
                <span>Generating suggestions…</span>
              </div>
              <div class="moves-error" id="f-moves-error" style="display:none"></div>
              <div id="f-moves-list"></div>
              <div class="moves-retry" id="f-moves-retry">
                <span class="moves-retry-note">Not quite right? Get different suggestions.</span>
                <button class="btn-retry" onclick="retryMoves()">Try different suggestions</button>
              </div>
            </div>
          </div>
        </div>

      </div>`;

    // Render QR code
    renderQR(participantUrl);

    // Trigger suggested moves if needed
    maybeShowMoves(s, sc, avg);
  }

  function fPick(n) {
    fPicked = n;
    document.querySelectorAll('#f-score-row .score-btn').forEach((b, i) =>
      b.classList.toggle('on', i+1 === n));
    const btn = document.getElementById('f-submit-btn');
    if (btn) btn.disabled = false;
  }

  async function fSubmit() {
    if (!fPicked) return;
    const s = st();
    if (!s.on) return;
    const score = fPicked;
    fPicked = null; fDidSubmit = true;
    await sessionRef().set(
      { responses: firebase.firestore.FieldValue.arrayUnion({ s: score, w: '' }) },
      { merge: true }
    );
  }

  function buildFacilitatorResults(s, sc, ws, avg) {
    const n = sc.length;
    const counts = [1,2,3,4,5].map(v => sc.filter(r => r===v).length);
    const maxC   = Math.max(1, ...counts);

    const barsHtml = counts.map((c, i) => `
      <div class="bar-row">
        <span class="bar-num">${i+1}</span>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(c/maxC*100).toFixed(1)}%; background:${BAR_COLORS[i]}"></div>
        </div>
        <span class="bar-ct">${c}</span>
      </div>`).join('');

    const wordCloudHtml = buildWordCloud(ws);

    return `
      <div class="card">
        <div class="avg-wrap">
          <div class="avg-num">${avg !== null ? avg.toFixed(1) : '—'}</div>
          <div class="avg-label">average</div>
        </div>
        <p class="resp-count">${n ? n+(n===1?' response':' responses') : 'No responses yet'}</p>
      </div>
      <div class="card">
        <span class="field-label" style="margin-bottom:16px; display:block">Response spread</span>
        ${barsHtml}
        <div class="spread-ends"><span>not at all</span><span>completely</span></div>
      </div>
      ${wordCloudHtml ? `
      <div class="card">
        <span class="field-label" style="margin-bottom:16px; display:block">In their words</span>
        <div class="word-cloud">${wordCloudHtml}</div>
      </div>` : ''}`;
  }

  function maybeShowMoves(s, sc, avg) {
    const movesWrap = document.getElementById('f-moves-wrap');
    if (!movesWrap) return;
    const n = sc.length;
    const needsMoves = s.on && s.q && n >= 2 && avg !== null && (isPolarised(sc) || avg < 3);
    if (!needsMoves) {
      movesWrap.style.display = 'none';
      movesLastKey   = null;
      movesPrevNames = [];
      return;
    }
    movesWrap.style.display = 'flex';
    const conditionKey = s.qid + '|' + (isPolarised(sc) ? 'polarised' : 'low') + '|' + avg.toFixed(1);
    if (conditionKey === movesLastKey) return;
    movesLastKey = conditionKey;
    fetchSuggestedMoves(s.q, sc, avg);
  }

  function isPolarised(sc) {
    if (sc.length < 4) return false;
    const low  = sc.filter(r => r <= 2).length;
    const high = sc.filter(r => r >= 4).length;
    const threshold = Math.ceil(sc.length * 0.25);
    return low >= threshold && high >= threshold;
  }

  // ── facilitator actions ────────────────────────────────────
  // (activateQ and resetQ are defined above as async Firestore writes)

  // ── suggested moves ────────────────────────────────────────
  function fetchSuggestedMoves(question, rs, avg, exclude) {
    const loadingEl = document.getElementById('f-moves-loading');
    const errorEl   = document.getElementById('f-moves-error');
    const listEl    = document.getElementById('f-moves-list');
    const retryEl   = document.getElementById('f-moves-retry');
    if (!loadingEl) return;

    errorEl.style.display  = 'none';
    listEl.innerHTML       = '';
    retryEl.style.display  = 'none';
    loadingEl.style.display = 'flex';

    const polarised = isPolarised(rs);
    const situation = polarised
      ? `The group is polarised — scores are split between high and low (average ${avg.toFixed(1)}/5).`
      : `The group has a low average score of ${avg.toFixed(1)}/5.`;

    const distribution = [1,2,3,4,5].map(v => `${v}: ${rs.filter(r => r===v).length}`).join(', ');
    const excludeLine  = exclude && exclude.length
      ? `\nDo NOT suggest any of these interventions (already shown): ${exclude.map(n=>`"${n}"`).join(', ')}.`
      : '';

    const prompt = `You are an experienced workshop facilitator. A temperature-check question has just revealed a problem in the room.

Question asked: "${question}"
Score distribution (1–5 scale): ${distribution}
Situation: ${situation}${excludeLine}

Suggest 2–3 concrete facilitation interventions the facilitator could try right now to address this. Each should be something that can be done in the next 5–10 minutes.

Return ONLY a JSON array. No prose, no markdown fences. Each element:
{"name": "Short name (3–5 words)", "action": "One sentence describing exactly what to do."}`;

    fetch('https://workshop-tools-api.onrender.com/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
    })
    .then(res => {
      if (!res.ok) return res.json().then(b => { throw new Error(b.error?.message || `API error ${res.status}`); });
      return res.json();
    })
    .then(data => {
      const raw = data.content?.[0]?.text || '';
      let moves;
      try {
        const cleaned = raw.replace(/^```[\w]*\n?/, '').replace(/\n?```$/, '').trim();
        moves = JSON.parse(cleaned);
      } catch (_) { throw new Error('Could not parse the response. Please try again.'); }
      if (!Array.isArray(moves) || moves.length === 0) throw new Error('Unexpected response. Please try again.');
      movesPrevNames = moves.map(m => m.name);
      listEl.innerHTML = moves.map(m => `
        <div class="move-item">
          <span class="move-name">${escapeHtml(m.name)}</span>
          <span class="move-desc">${escapeHtml(m.action)}</span>
        </div>`).join('');
      retryEl.style.display = 'flex';
    })
    .catch(err => {
      errorEl.textContent    = err.message;
      errorEl.style.display  = 'block';
      movesLastKey = null;
    })
    .finally(() => { loadingEl.style.display = 'none'; });
  }

  function retryMoves() {
    const s  = st();
    const sc = scores(s.rs);
    const avg = sc.length ? sc.reduce((a,b)=>a+b,0)/sc.length : null;
    if (!avg) return;
    movesLastKey = null;
    fetchSuggestedMoves(s.q, sc, avg, movesPrevNames);
  }

  // ── QR code ────────────────────────────────────────────────
  function renderQR(url) {
    const canvas = document.getElementById('qr-canvas');
    if (!canvas) return;
    const img = document.createElement('img');
    img.width  = 180;
    img.height = 180;
    img.style.borderRadius = '8px';
    img.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(url)}&color=2e3d38&bgcolor=ffffff&margin=2`;
    img.alt = 'QR code for participant URL';
    canvas.replaceWith(img);
  }

  // ── dev test mode ──────────────────────────────────────────
  if (params.has('test') && IS_FACILITATOR) {
    window.injectTestResponses = async function() {
      const s = st();
      if (!s.on || !s.q) { alert('Activate a question first.'); return; }
      await sessionRef().update({ responses: [
        { s:1, w:'confusing' }, { s:1, w:'unclear' },
        { s:1, w:'confusing' }, { s:1, w:'rushed' },
        { s:5, w:'clear' },     { s:5, w:'clear' },
        { s:5, w:'solid' },     { s:5, w:'' }
      ]});
      movesLastKey = null; movesPrevNames = [];
    };
  }

  // ── facilitator chrome ─────────────────────────────────────
  if (IS_FACILITATOR) {
    const badge = document.createElement('div');
    badge.className = 'facilitator-badge';
    badge.textContent = 'Facilitator view';
    document.body.appendChild(badge);

    const bar = document.createElement('div');
    bar.className = 'facilitator-nav-bar';
    document.body.appendChild(bar);
    updateNavBar();

    document.getElementById('app').style.paddingBottom = '5rem';
  }

  // ── boot ───────────────────────────────────────────────────
  subscribeToSession();
</script>
